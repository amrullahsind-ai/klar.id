name: Build Klaar Hadir APK

on:
  workflow_dispatch:
  push:
    paths:
      - "android-employee/**"
      - ".github/workflows/build-employee-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-employee
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      - name: Build debug APK
        run: gradle assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: klaar-hadir-debug-apk
          path: android-employee/app/build/outputs/apk/debug/app-debug.apk
