name: Release Klaar Hadir APK

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: "Version code (harus naik, contoh: 3)"
        required: true
        default: "2"
        type: string
      version_name:
        description: "Nama versi (contoh: 1.1.0)"
        required: true
        default: "1.1.0"
        type: string
      notes:
        description: "Catatan pembaruan untuk pengguna"
        required: true
        default: "Peningkatan stabilitas Klaar Hadir."
        type: string
      mandatory:
        description: "Wajib diperbarui sebelum lanjut"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: klaar-hadir-production-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      KLAAR_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      KLAAR_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      KLAAR_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      INPUT_VERSION_CODE: ${{ inputs.version_code }}
      INPUT_VERSION_NAME: ${{ inputs.version_name }}
      INPUT_MANDATORY: ${{ inputs.mandatory }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Validate release configuration
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo "Secret ANDROID_KEYSTORE_BASE64 belum ada"; exit 1; }
          test -n "$KLAAR_KEYSTORE_PASSWORD" || { echo "Secret ANDROID_KEYSTORE_PASSWORD belum ada"; exit 1; }
          test -n "$KLAAR_KEY_ALIAS" || { echo "Secret ANDROID_KEY_ALIAS belum ada"; exit 1; }
          test -n "$KLAAR_KEY_PASSWORD" || { echo "Secret ANDROID_KEY_PASSWORD belum ada"; exit 1; }
          [[ "$INPUT_VERSION_CODE" =~ ^[1-9][0-9]*$ ]] || { echo "version_code harus bilangan positif"; exit 1; }
          [[ "$INPUT_VERSION_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9]+)?$ ]] || {
            echo "version_name harus seperti 1.1.0"; exit 1;
          }
          CURRENT_VERSION_CODE=$(jq -r '.versionCode' apk-version.json)
          test "$INPUT_VERSION_CODE" -gt "$CURRENT_VERSION_CODE" || {
            echo "version_code harus lebih besar dari versi terbit ($CURRENT_VERSION_CODE)"; exit 1;
          }
          jq -e '(.apkUrl | startswith("https://"))' apk-version.json >/dev/null

      - name: Prepare central release metadata
        shell: bash
        env:
          RELEASE_NOTES: ${{ inputs.notes }}
        run: |
          set -euo pipefail
          jq \
            --argjson code "$INPUT_VERSION_CODE" \
            --arg name "$INPUT_VERSION_NAME" \
            --arg notes "$RELEASE_NOTES" \
            --argjson mandatory "$INPUT_MANDATORY" \
            '.versionCode = $code
              | .versionName = $name
              | .apkUrl = ("https://github.com/amrullahsind-ai/klar.id/releases/download/apk-v" + $name + "/klaar-hadir.apk")
              | .notes = $notes
              | .mandatory = $mandatory
              | .sha256 = ""' \
            apk-version.json > apk-version.tmp.json
          mv apk-version.tmp.json apk-version.json

      - name: Restore permanent release keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android-employee/app/klaar-release.jks

      - name: Read release version
        shell: bash
        run: |
          set -euo pipefail
          echo "KLAAR_VERSION_CODE=$(jq -r '.versionCode' apk-version.json)" >> "$GITHUB_ENV"
          echo "KLAAR_VERSION_NAME=$(jq -r '.versionName' apk-version.json)" >> "$GITHUB_ENV"
          echo "KLAAR_KEYSTORE_FILE=$GITHUB_WORKSPACE/android-employee/app/klaar-release.jks" >> "$GITHUB_ENV"

      - name: Build signed release APK
        working-directory: android-employee
        run: gradle assembleRelease --no-daemon

      - name: Prepare release asset and checksum
        shell: bash
        run: |
          set -euo pipefail
          cp android-employee/app/build/outputs/apk/release/app-release.apk klaar-hadir.apk
          APK_SHA256=$(sha256sum klaar-hadir.apk | awk '{print $1}')
          echo "APK_SHA256=$APK_SHA256" >> "$GITHUB_ENV"
          jq --arg sha "$APK_SHA256" '.sha256 = $sha' apk-version.json > apk-version.tmp.json
          mv apk-version.tmp.json apk-version.json
          jq -r '.notes' apk-version.json > release-notes.txt

      - name: Publish or replace GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="apk-v${KLAAR_VERSION_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" klaar-hadir.apk --clobber
            gh release edit "$TAG" --title "Klaar Hadir ${KLAAR_VERSION_NAME}" --notes-file release-notes.txt
          else
            gh release create "$TAG" klaar-hadir.apk \
              --title "Klaar Hadir ${KLAAR_VERSION_NAME}" \
              --notes-file release-notes.txt \
              --latest
          fi

      - name: Publish verified checksum to central metadata
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apk-version.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: publish Klaar Hadir ${KLAAR_VERSION_NAME} checksum"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: klaar-hadir-release-${{ env.KLAAR_VERSION_NAME }}
          path: klaar-hadir.apk
          if-no-files-found: error

      - name: Release summary
        shell: bash
        run: |
          {
            echo "### Klaar Hadir ${KLAAR_VERSION_NAME}"
            echo "- versionCode: ${KLAAR_VERSION_CODE}"
            echo "- SHA-256: \`${APK_SHA256}\`"
            echo "- Asset: \`klaar-hadir.apk\`"
          } >> "$GITHUB_STEP_SUMMARY"
