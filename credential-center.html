<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Credential Center — Klaar</title>
  <link rel="icon" href="klaar-logo.png" />
  <style>
    :root{--primary:#085842;--accent:#39ae89;--bg:#f5fbf8;--surface:#fff;--text:#16352e;--muted:#5f786f;--border:#d7e7e0;--danger:#c2413b;--success:#16834f}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;background:radial-gradient(circle at 20% 10%,#e2f6ed,transparent 38%),var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,sans-serif}
    .card{width:min(100%,620px);background:var(--surface);border:1px solid var(--border);border-radius:26px;padding:clamp(20px,5vw,34px);box-shadow:0 24px 70px rgba(8,88,66,.1)}
    .brand{display:flex;gap:14px;align-items:center;margin-bottom:20px}.brand img{width:54px;height:54px;border-radius:16px}.brand h1{font-size:22px;margin:0}.brand p{margin:4px 0 0;color:var(--muted);font-size:14px}
    .form{display:grid;grid-template-columns:1fr 1fr;gap:14px}.wide{grid-column:1/-1}.field{display:grid;gap:7px}.field label{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
    input{width:100%;min-width:0;border:1px solid var(--border);border-radius:14px;padding:12px 13px;font:inherit;color:inherit;background:#fff;outline:none}input:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(8,88,66,.1)}
    .actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:4px}.btn{border:1px solid var(--border);border-radius:14px;padding:11px 15px;background:#fff;color:var(--text);font:inherit;font-weight:800;cursor:pointer;text-decoration:none}.btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}.btn:disabled{opacity:.6;cursor:wait}
    #status{display:none;margin:16px 0 0;padding:12px 14px;border-radius:14px;background:#f3f7f5;color:var(--muted);line-height:1.5}#status.show{display:block}#status.ok{background:#e8f8ef;color:var(--success)}#status.bad{background:#fff0ef;color:var(--danger)}
    .note{margin:0 0 20px;padding:12px 14px;border-radius:14px;background:#eaf6f0;color:var(--muted);font-size:13px;line-height:1.5}
    @media(max-width:620px){.form{grid-template-columns:1fr}.wide{grid-column:auto}.actions .btn{width:100%;text-align:center}}
  </style>
</head>
<body>
  <main class="card">
    <div class="brand"><img src="klaar-logo.png" alt="Klaar" /><div><h1>Credential Center</h1><p>Ganti username dan PIN administrator.</p></div></div>
    <p class="note">Perubahan dikirim langsung ke layanan cloud Klaar. Anda tidak perlu memasukkan URL server atau melakukan deploy apa pun.</p>
    <form id="form" class="form">
      <div class="field wide"><label for="licenseCode">Kode lisensi</label><input id="licenseCode" autocomplete="off" required /></div>
      <div class="field"><label for="oldUser">Username lama</label><input id="oldUser" autocomplete="username" required /></div>
      <div class="field"><label for="oldPin">PIN lama</label><input id="oldPin" type="password" autocomplete="current-password" required /></div>
      <div class="field"><label for="newUser">Username baru</label><input id="newUser" autocomplete="username" required /></div>
      <div class="field"><label for="newPin">PIN baru</label><input id="newPin" type="password" minlength="6" autocomplete="new-password" required /></div>
      <div class="field wide"><label for="newPin2">Konfirmasi PIN baru</label><input id="newPin2" type="password" minlength="6" autocomplete="new-password" required /></div>
      <div class="actions wide"><button class="btn primary" type="submit">Verifikasi &amp; Ganti</button><a class="btn" href="admin.html">Kembali ke Admin</a></div>
    </form>
    <p id="status" role="status" aria-live="polite"></p>
  </main>
  <script>
    const KLAAR_API = "https://swvqagxwwoefnrezqfnq.supabase.co/functions/v1/dynamic-handler";
    const SALT = "|edupay-v4-final-rebuild";
    const $ = id => document.getElementById(id);
    async function sha(text){
      const bytes = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(String(text) + SALT));
      return Array.from(new Uint8Array(bytes)).map(x => x.toString(16).padStart(2,"0")).join("");
    }
    function setStatus(message, type=""){
      const el = $("status");
      el.textContent = message;
      el.className = "show " + type;
    }
    $("form").addEventListener("submit", async event => {
      event.preventDefault();
      if ($("newPin").value !== $("newPin2").value) return setStatus("Konfirmasi PIN baru tidak sama.", "bad");
      const button = event.submitter;
      button.disabled = true;
      setStatus("Memverifikasi kredensial…");
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 20000);
      try {
        const response = await fetch(KLAAR_API, {
          method: "POST",
          headers: {"content-type":"application/json"},
          signal: controller.signal,
          body: JSON.stringify({
            action: "changeAdminCredential",
            licenseCode: $("licenseCode").value.trim(),
            oldUser: $("oldUser").value.trim(),
            oldHash: await sha($("oldPin").value),
            newUser: $("newUser").value.trim(),
            newHash: await sha($("newPin").value)
          })
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok || !result.ok) throw new Error(result.error || "Perubahan kredensial gagal.");
        setStatus(result.message || "Kredensial admin berhasil diganti. Silakan login dengan username dan PIN baru.", "ok");
        $("form").reset();
      } catch (error) {
        setStatus(error.name === "AbortError" ? "Koneksi timeout. Silakan coba lagi." : (error.message || "Tidak dapat menghubungi layanan Klaar."), "bad");
      } finally {
        clearTimeout(timer);
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
