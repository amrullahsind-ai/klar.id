.app{display:block;max-width:640px;margin:auto;padding:18px}</style></head><body><main class="app"><div class="card"><h2 style="margin:0 0 6px">Credential Center</h2><p class="muted">Halaman privat untuk mengganti username/PIN admin. Tidak ditaruh di Admin PWA.</p><form class="form" id="form"><div class="field wide"><label>License Server URL</label><input id="serverUrl" required></div><div class="field wide"><label>Kode Lisensi</label><input id="licenseCode" required></div><div class="field"><label>Username lama</label><input id="oldUser" required></div><div class="field"><label>PIN lama</label><input id="oldPin" type="password" required></div><div class="field"><label>Username baru</label><input id="newUser" required></div><div class="field"><label>PIN baru</label><input id="newPin" type="password" minlength="4" required></div><div class="field wide"><label>Konfirmasi PIN baru</label><input id="newPin2" type="password" minlength="4" required></div><button class="btn primary wide">Verifikasi & Ganti</button></form><p class="muted" id="status"></p></div></main><iframe name="frame" class="hidden"></iframe><script>const SALT='|edupay-v4-final-rebuild';const $=id=>document.getElementById(id);async function sha(text){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(String(text)+SALT));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
function jsonp(url,params){return new Promise((resolve,reject)=>{let cb='cc_cb_'+Date.now()+'_'+Math.random().toString(36).slice(2),s=document.createElement('script'),sep=url.includes('?')?'&':'?';let q=new URLSearchParams(Object.assign({},params,{callback:cb,t:Date.now()}));let timer=setTimeout(()=>{cleanup();reject(new Error('Timeout koneksi'))},16000);function cleanup(){clearTimeout(timer);delete window[cb];s.remove()}window[cb]=r=>{cleanup();resolve(r)};s.onerror=()=>{cleanup();reject(new Error('Gagal akses server. Pastikan URL Apps Script benar (berakhiran /exec) dan sudah diredeploy.'))};s.src=url+sep+q.toString();document.body.appendChild(s)})}
$('form').onsubmit=async e=>{e.preventDefault();let st=$('status');st.style.color='';if($('newPin').value!==$('newPin2').value){st.style.color='var(--danger)';st.textContent='Konfirmasi PIN baru tidak sama.';return}let url=$('serverUrl').value.trim();if(!url){st.style.color='var(--danger)';st.textContent='License Server URL belum diisi.';return}let btn=e.submitter;if(btn)btn.disabled=true;st.textContent='Mengirim permintaan...';try{let res=await jsonp(url,{action:'changeAdminCredential',licenseCode:$('licenseCode').value.trim(),oldUser:$('oldUser').value.trim(),oldHash:await sha($('oldPin').value),newUser:$('newUser').value.trim(),newHash:await sha($('newPin').value)});if(res&&res.ok){st.style.color='var(--success)';st.textContent='✓ '+(res.message||'Kredensial admin berhasil diganti.')+' Sekarang login Admin pakai username & PIN baru.';$('form').reset()}else{st.style.color='var(--danger)';st.textContent='Gagal: '+((res&&res.error)||'Tidak diketahui')}}catch(err){st.style.color='var(--danger)';st.textContent='Gagal: '+err.message}finally{if(btn)btn.disabled=false}};</script></body></html>
