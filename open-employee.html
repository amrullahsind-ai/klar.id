<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#085842" />
    <title>Buka Klaar Hadir</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        color: #0f172a;
        background: linear-gradient(145deg, #effaf6, #f8fafc);
      }
      main {
        width: min(100%, 420px);
        padding: 30px 24px;
        border: 1px solid #dbe8e3;
        border-radius: 24px;
        background: #fff;
        box-shadow: 0 20px 50px rgba(8, 88, 66, .12);
        text-align: center;
      }
      img { width: 88px; height: 88px; border-radius: 22px; }
      h1 { margin: 18px 0 8px; font-size: 25px; }
      p { margin: 0 0 22px; color: #64748b; line-height: 1.55; }
      a {
        display: block;
        width: 100%;
        padding: 14px 18px;
        border-radius: 14px;
        font-weight: 800;
        text-decoration: none;
      }
      #openApp { color: #fff; background: #085842; }
      #openWeb { margin-top: 10px; color: #085842; background: #e7f6f0; }
      .note { margin-top: 18px; font-size: 12px; }
    </style>
  </head>
  <body>
    <main>
      <img src="./klaar-logo.png" alt="Logo Klaar" />
      <h1>Buka Klaar Hadir</h1>
      <p>Pilih aplikasi agar kode sekolah terpasang otomatis, lalu login menggunakan NIP dan PIN.</p>
      <a id="openApp" href="#">Buka di Aplikasi Klaar Hadir</a>
      <a id="openWeb" href="./employee.html">Lanjutkan di Browser</a>
      <p class="note">Belum punya aplikasi? Gunakan pilihan browser terlebih dahulu.</p>
    </main>
    <script>
      const token = new URLSearchParams(location.search).get("k") || "";
      const validToken = /^[A-Za-z0-9_-]+$/.test(token) ? token : "";
      const webUrl = "./employee.html" + (validToken ? "#k=" + validToken : "");
      document.getElementById("openWeb").href = webUrl;
      document.getElementById("openApp").href = validToken
        ? "klaarhadir://login?k=" + validToken
        : "klaarhadir://login";
    </script>
  </body>
</html>
